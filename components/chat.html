<div class="chat_fab" id="chatButton">
    <i class="far fa-comment-dots"></i>
</div>
<div class="chat" id="chatWidget">
    <div class="chat__header">
        <span class="chat__title">Чат SKINHEAD</span>
        <button class="chat__close" id="chatCloseBtn">&times;</button>
    </div>
    <div class="chat__messages" id="chatMessages"></div>
    <div class="chat__footer">
        <input type="text" class="chat__input" id="chatInput" placeholder="Напишите сообщение...">
        <button class="chat__send" id="chatSendBtn">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>
